<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticketbox - Đặt vé Concert "Anh Trai Say Hi" 2026</title>
    <meta name="description" content="Hệ thống đặt vé Live Concert Anh Trai Say Hi 2026 chính thức. Đặt vé trực tuyến nhanh chóng, an toàn và chống quá tải." />
  </head>
  <body style="background-color: #0a0b10; color: #f8f9fa; margin: 0;">
    <div id="root">
      <!-- Static loader displayed while JS bundles are downloading -->
      <div style="
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        width: 100vw;
        background-color: #0a0b10;
        color: #f8f9fa;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      ">
        <div style="
          width: 36px;
          height: 36px;
          border: 3px solid rgba(157, 78, 221, 0.1);
          border-top: 3px solid #9d4edd;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
          margin-bottom: 16px;
        "></div>
        <span style="font-size: 14px; color: #adb5bd; font-weight: 600; letter-spacing: 0.5px;">
          Đang tải ứng dụng...
        </span>
        <style>
          @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
