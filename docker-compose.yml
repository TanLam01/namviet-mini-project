version: '3.8'

services:
  backend:
    build: ./backend
    container_name: ticketbox_backend
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_USER: root
      DB_PASSWORD: secret       # Thay đổi mật khẩu này nếu container postgres17 của bạn đặt pass khác
      DB_NAME: postgres           # Dùng DB mặc định "postgres" để không cần tạo thủ công DB "ticketbox"
      DB_SSLMODE: disable
      REDIS_ADDR: host.docker.internal:6379
      GIN_MODE: release
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  frontend:
    build: ./frontend
    container_name: ticketbox_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
