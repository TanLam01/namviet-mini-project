version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: ticketbox_db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ticketbox_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: ticketbox_backend
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: root
      DB_PASSWORD: secret
      DB_NAME: postgres
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      GIN_MODE: release
    depends_on:
      - db
      - redis
    restart: always

  frontend:
    build: ./frontend
    container_name: ticketbox_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
